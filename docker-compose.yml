services:
  engine:
    build:
      context: .
    container_name: nexus-engine
    depends_on:
      - ollama
      - qdrant
    environment:
      HOST: 0.0.0.0
      PORT: 3131
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      NEXUS_NODE_STORE: /data/nodes.sqlite
      NEXUS_MEMORY_ENABLED: ${NEXUS_MEMORY_ENABLED:-1}
      NEXUS_QDRANT_URL: http://qdrant:6333
      NEXUS_QDRANT_GRPC_URL: qdrant:6334
      NEXUS_MEMORY_COLLECTION: ${NEXUS_MEMORY_COLLECTION:-nexus_memories}
      NEXUS_ALLOW_MOCK_MCP: ${NEXUS_ALLOW_MOCK_MCP:-0}
    ports:
      - "127.0.0.1:3131:3131"
    volumes:
      - nexus_engine_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  ollama-models:
    image: ollama/ollama:latest
    container_name: nexus-ollama-models
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull "$$OLLAMA_MODEL";
      ollama pull "$$OLLAMA_EMBED_MODEL";
      echo "Nexus models are ready: $$OLLAMA_MODEL, $$OLLAMA_EMBED_MODEL"
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  nexus_engine_data:
  ollama_models:
  qdrant_storage:
